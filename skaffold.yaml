apiVersion: skaffold/v4beta1
kind: Config

build:
  artifacts:
  - image: app

manifests:
  rawYaml:
    - k8s/deployment.yaml
    - k8s/service.yaml

deploy:
  kubectl: {}

profiles:
- name: dev
  deploy:
    kubectl:
      defaultNamespace: dev
  patches:
  - op: replace
    path: /spec/template/spec/nodeSelector/env
    value: dev

- name: prod
  deploy:
    kubectl:
      defaultNamespace: prod
  patches:
  - op: replace
    path: /spec/template/spec/nodeSelector/env
    value: prod
